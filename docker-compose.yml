services:
  mr-reviewer:
    build: .
    env_file:
      - .env
    volumes:
      - ./mr_reviewer:/app/mr_reviewer
    entrypoint: ["bash"]
    stdin_open: true
    tty: true

  backend:
    build: .
    command: --serve --host 0.0.0.0 --port 8080
    env_file:
      - .env
    ports:
      - "8080:8080"
    volumes:
      - ./mr_reviewer:/app/mr_reviewer

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

  frontend-dev:
    image: node:20-slim
    profiles: ["dev"]
    working_dir: /app
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    environment:
      - VITE_API_PROXY_TARGET=http://backend:8080
    entrypoint: ["sh", "-c", "npm install && npm run dev -- --host 0.0.0.0"]
    depends_on:
      - backend

volumes:
  frontend_node_modules:
